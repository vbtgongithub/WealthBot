# =============================================================================
# WealthBot Alembic Configuration
# Database migration management
# =============================================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Set to 'true' to run migrations in asyncio context
# async_fallback = false

# Timezone for migration timestamps
timezone = UTC

# Truncate revision hashes in filenames
truncate_slug_length = 40

# Set to 'true' to enable SQLAlchemy's echo mode
# revision_environment = false

# Maximum length for column values in autogenerated revision
# max_column_string_length = 500

# Prepend sys.path entries for import resolution
prepend_sys_path = .

# Version location directory (can specify multiple)
version_locations = %(here)s/alembic/versions

# Output encoding for revision files
output_encoding = utf-8

# Connection string - loaded from environment in env.py
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Format migration files with black after generation
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -q


# =============================================================================
# Logging Configuration
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
