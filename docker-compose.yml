# =============================================================================
# WealthBot Docker Compose Configuration
# Orchestrates FastAPI application and PostgreSQL 16
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: wealthbot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wealthbot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wealthbot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-wealthbot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wealthbot_user} -d ${POSTGRES_DB:-wealthbot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wealthbot_network

  # ---------------------------------------------------------------------------
  # FastAPI Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealthbot_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-wealthbot_user}:${POSTGRES_PASSWORD:-wealthbot_secret}@db:5432/${POSTGRES_DB:-wealthbot_db}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - MODEL_PATH=${MODEL_PATH:-./ml/models/xgboost_spending_model.pkl}
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./app:/app/app:ro
      - ./ml:/app/ml:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wealthbot_network

  # ---------------------------------------------------------------------------
  # Redis Cache (Optional - for session management)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: wealthbot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - wealthbot_network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  wealthbot_network:
    driver: bridge
